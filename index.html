// ── Minimal Supabase client (no npm needed) ────────────────────────
function createClient(url, key) {
  const headers = { "Content-Type": "application/json", "apikey": key, "Authorization": `Bearer ${key}` };

  const base = url.replace(/\/+$/, ""); const rest = (path) => `${base}/rest/v1/${path}`;
  const rpc  = (fn)   => `${base}/rest/v1/rpc/${fn}`;

  async function query(table, params = {}) {
    const qs = Object.entries(params).map(([k, v]) => `${k}=${encodeURIComponent(v)}`).join("&");
    const res = await fetch(`${rest(table)}${qs ? "?" + qs : ""}`, { headers: { ...headers, "Prefer": "return=representation" } });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function insert(table, data) {
    const res = await fetch(rest(table), {
      method: "POST", headers: { ...headers, "Prefer": "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function update(table, match, data) {
    const qs = Object.entries(match).map(([k, v]) => `${k}=eq.${encodeURIComponent(v)}`).join("&");
    const res = await fetch(`${rest(table)}?${qs}`, {
      method: "PATCH", headers: { ...headers, "Prefer": "return=representation" },
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  async function remove(table, match) {
    const qs = Object.entries(match).map(([k, v]) => `${k}=eq.${encodeURIComponent(v)}`).join("&");
    const res = await fetch(`${rest(table)}?${qs}`, { method: "DELETE", headers });
    if (!res.ok) throw new Error(await res.text());
  }

  // Real-time via Supabase Realtime WebSocket
  function subscribe(table, callback) {
    const wsUrl = `${base.replace("https://", "wss://").replace("http://", "ws://")}/realtime/v1/websocket?vsn=1.0.0&apikey=${key}`;
    let ws;
    let reconnectTimer;

    function connect() {
      ws = new WebSocket(wsUrl);
      ws.onopen = () => {
        ws.send(JSON.stringify({ topic: "realtime:*", event: "phx_join", payload: { config: { broadcast: { self: true }, presence: {}, postgres_changes: [{ event: "*", schema: "public", table }] } }, ref: "1" }));
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.event === "postgres_changes" || (msg.payload && msg.payload.data)) callback();
        // heartbeat
        if (msg.event === "heartbeat") ws.send(JSON.stringify({ topic: "phoenix", event: "heartbeat", payload: {}, ref: null }));
      };
      ws.onclose = () => { reconnectTimer = setTimeout(connect, 3000); };
      ws.onerror = () => { ws.close(); };
    }

    connect();
    return () => { clearTimeout(reconnectTimer); if (ws) ws.close(); };
  }

  return { query, insert, update, remove, subscribe };
}

function PhotoUploader({ value, onChange, label }) {
  const inputRef = useRef(null);
  const handleFile = useCallback((e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { if (ev.target && ev.target.result) onChange(ev.target.result); };
    reader.readAsDataURL(file);
  }, [onChange]);
  const clear = useCallback((e) => {
    e.stopPropagation(); onChange(null);
    if (inputRef.current) inputRef.current.value = "";
  }, [onChange]);
  return (
    <div>
      {label && <label style={LABEL}>{label}</label>}
      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
        <label style={{ flex: 1, display: "flex", alignItems: "center", gap: 10, cursor: "pointer", background: "#0a0a18", border: "1px dashed #2d2d4a", borderRadius: 8, padding: "9px 12px", fontSize: 13, color: value ? "#a78bfa" : "#6b7280" }}>
          {value
            ? <><img src={value} alt="preview" style={{ width: 32, height: 32, borderRadius: "50%", objectFit: "cover", border: "2px solid #6d28d9", flexShrink: 0 }} /><span style={{ color: "#a78bfa", fontWeight: 600 }}>Photo ready ✓</span></>
            : <><span style={{ fontSize: 20 }}>📷</span><span>Click to upload photo</span></>
          }
          <input ref={inputRef} type="file" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" style={{ display: "none" }} onChange={handleFile} />
        </label>
        {value && <button onClick={clear} style={{ ...DBTN, padding: "9px 12px", fontSize: 16, lineHeight: 1 }}>✕</button>}
      </div>
    </div>
  );
}

  const sql = `-- Run this in Supabase SQL Editor

  id      TEXT PRIMARY KEY DEFAULT 'main',
  voting_open BOOLEAN NOT NULL DEFAULT false
);
INSERT INTO election_config (id, voting_open) VALUES ('main', false)
ON CONFLICT (id) DO NOTHING;

-- Table: posts (election posts like President, Secretary)
CREATE TABLE IF NOT EXISTS posts (
  id         TEXT PRIMARY KEY,
  title      TEXT NOT NULL,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- Table: candidates (one candidate belongs to one post)
CREATE TABLE IF NOT EXISTS candidates (
  id      TEXT PRIMARY KEY,
  post_id TEXT NOT NULL REFERENCES posts(id) ON DELETE CASCADE,
  name    TEXT NOT NULL,
  photo   TEXT  -- base64 data URL
);

-- Table: voters
CREATE TABLE IF NOT EXISTS voters (
  matric_no  TEXT PRIMARY KEY,
  full_name  TEXT NOT NULL,
  level      TEXT NOT NULL,

// DATA HOOKS
// ══════════════════════════════════════════════════════════════════════
function useElectionData() {
  const [data, setData] = useState({ config: { voting_open: false }, posts: [], candidates: [], voters: [], loading: true, error: null });

  const load = useCallback(async () => {
    try {
      const [configs, posts, candidates, voters] = await Promise.all([
        db.query("election_config"),
        db.query("posts", { order: "created_at.asc" }),
        db.query("candidates"),
        db.query("voters"),
      ]);
      setData(d => ({ ...d, config: configs[0] || { voting_open: false }, posts, candidates, voters, loading: false, error: null }));
    } catch (e) {
      setData(d => ({ ...d, loading: false, error: e.message }));
    }
  }, []);

  useEffect(() => {
    load();
    const unsubs = ["posts", "candidates", "voters", "election_config"].map(t => db.subscribe(t, load));
    const interval = setInterval(load, 8000); // fallback poll every 8s
    return () => { unsubs.forEach(u => u()); clearInterval(interval); };
  }, [load]);

  return { ...data, reload: load };
}

function getTally(posts, candidates, voters) {
  const tally = {};
  posts.forEach(p => {
    tally[p.id] = {};
    candidates.filter(c => c.post_id === p.id).forEach(c => { tally[p.id][c.id] = 0; });
  });
  voters.forEach(v => {
    if (!v.voted || !v.votes) return;
    Object.entries(v.votes).forEach(([pid, cid]) => {
      if (tally[pid] && cid) tally[pid][cid] = (tally[pid][cid] || 0) + 1;
    });
  });
  return tally;
}

  const [expandedPost, setExpandedPost] = useState(null);

  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 3000); };

  const run = async (fn, msg) => {
    setBusy(true);
    try { await fn(); await reload(); flash(msg); }
    catch (e) { flash("Error: " + e.message); }
    finally { setBusy(false); }

      setNewPostTitle("");

    await db.remove("candidates", { post_id: id });

                      <div style={{ flex: "1 1 200px" }}>
                        <PhotoUploader label="Photo (optional)" value={candPhoto[post.id] || null} onChange={v => setCandPhoto(p => ({ ...p, [post.id]: v }))} />
                      </div>
                      <button onClick={() => addCandidate(post.id)} disabled={busy} style={{ ...PBTN, alignSelf: "flex-end", opacity: busy ? 0.7 : 1 }}>+ Add Candidate</button>
                    </div>
                  </div>

                  {postCandidates.length === 0
                    ? <div style={{ fontSize: 13, color: "#2d2d4a" }}>No candidates yet.</div>
                    : (
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                        {postCandidates.map(c => (
                          <div key={c.id} style={{ background: "rgba(109,40,217,0.1)", border: "1px solid rgba(109,40,217,0.22)", borderRadius: 10, padding: "8px 12px", display: "flex", alignItems: "center", gap: 10 }}>
                            {c.photo ? <img src={c.photo} alt={c.name} style={{ width: 34, height: 34, borderRadius: "50%", objectFit: "cover", border: "2px solid #6d28d9" }} /> : <div style={{ width: 34, height: 34, borderRadius: "50%", background: "#1a1a2e", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>👤</div>}
                            <span style={{ color: "#d8b4fe", fontSize: 13, fontWeight: 600 }}>{c.name}</span>
                            <button onClick={() => removeCandidate(c.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "#4b5563", fontSize: 15, padding: 0, lineHeight: 1, fontFamily: "inherit" }}>✕</button>
                          </div>
                        ))}
                      </div>
                    )
                  }
                </div>
              );
            })}
          </div>
        )}

        {/* VOTERS */}
        {tab === "voters" && (
          <div className="fi">
            <SH>Voter Management</SH>
            <div style={CARD}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#a78bfa", marginBottom: 12 }}>Register Single Voter</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(170px,1fr))", gap: 10, alignItems: "end" }}>
                <div><label style={LABEL}>Full Name</label><input value={newVoter.fullName} onChange={e => setNewVoter(v => ({ ...v, fullName: e.target.value }))} placeholder="e.g. Ada Okafor" style={INPUT} /></div>
                <div><label style={LABEL}>Matric Number</label><input value={newVoter.matricNo} onChange={e => setNewVoter(v => ({ ...v, matricNo: e.target.value }))} placeholder="e.g. 241811022" style={INPUT} /></div>
                <div><label style={LABEL}>Level</label><select value={newVoter.level} onChange={e => setNewVoter(v => ({ ...v, level: e.target.value }))} style={INPUT}>{["100", "200", "300", "400"].map(l => <option key={l}>{l}</option>)}</select></div>
                <div><label style={LABEL}>Unique Code</label><div style={{ display: "flex", gap: 6 }}><input value={newVoter.code} onChange={e => setNewVoter(v => ({ ...v, code: e.target.value }))} placeholder="Code" style={{ ...INPUT, flex: 1, marginBottom: 0 }} /><button onClick={genCode} style={{ ...PBTN, padding: "0 12px" }}>⚡</button></div></div>
                <button onClick={addVoter} disabled={busy} style={{ ...PBTN, alignSelf: "flex-end" }}>Register</button>
              </div>
            </div>
            <div style={CARD}>
              <div style={{ fontSize: 13, fontWeight: 700, color: "#a78bfa", marginBottom: 6 }}>Bulk Import</div>
              <div style={{ fontSize: 12, color: "#4b5563", marginBottom: 8 }}>One per line: <code style={{ color: "#a78bfa" }}>MatricNo, FullName, Level, Code</code> (Code optional)</div>
              <textarea value={bulkText} onChange={e => setBulkText(e.target.value)} placeholder={"241811001, Ada Okafor, 200, ABC123\n241811002, Tunde Bello, 100"} style={{ ...INPUT, height: 90, resize: "vertical", display: "block", marginBottom: 10 }} />
              <button onClick={bulkImport} disabled={busy} style={PBTN}>Import Voters</button>
            </div>
            {voters.length === 0 && !loading ? <Empty>No voters registered yet.</Empty> : (
              <div style={CARD}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#a78bfa", marginBottom: 12 }}>Registered Voters ({voters.length})</div>
                <div style={{ overflowX: "auto" }}>
                  <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                    <thead><tr style={{ borderBottom: "1px solid #111827" }}>{["Name", "Matric No", "Level", "Code", "Status", "Actions"].map(h => <th key={h} style={{ padding: "8px 10px", textAlign: "left", color: "#4b5563", fontWeight: 700, whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
                    <tbody>
                      {voters.map(v => (
                        <tr key={v.matric_no} style={{ borderBottom: "1px solid #0a0a14" }}>
                          <td style={{ padding: "9px 10px", color: "#e5e7eb", fontWeight: 600 }}>{v.full_name || "—"}</td>
                          <td style={{ padding: "9px 10px", color: "#9ca3af", fontFamily: "monospace" }}>{v.matric_no}</td>
                          <td style={{ padding: "9px 10px", color: "#a78bfa" }}>{v.level}</td>
                          <td style={{ padding: "9px 10px", color: "#60a5fa", fontFamily: "monospace" }}>{v.code}</td>
                          <td style={{ padding: "9px 10px" }}><span style={{ background: v.voted ? "rgba(16,185,129,0.12)" : "rgba(107,114,128,0.1)", color: v.voted ? "#34d399" : "#6b7280", border: `1px solid ${v.voted ? "#10b981" : "#374151"}`, borderRadius: 100, padding: "2px 10px", fontSize: 11, fontWeight: 700 }}>{v.voted ? "✓ Voted" : "Pending"}</span></td>
                          <td style={{ padding: "9px 10px" }}><div style={{ display: "flex", gap: 6 }}>{v.voted && <button onClick={() => resetVoter(v.matric_no)} style={{ ...DBTN, fontSize: 11, padding: "3px 8px" }}>Reset</button>}<button onClick={() => removeVoter(v.matric_no)} style={{ ...DBTN, fontSize: 11, padding: "3px 8px", color: "#ef4444" }}>Remove</button></div></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}

        {/* RESULTS */}
        {tab === "results" && (
          <div className="fi">
            <SH>Live Results</SH>
            {posts.length === 0 && !loading && <Empty>No posts configured yet.</Empty>}
            {posts.map(post => {
              const postCandidates = candidates.filter(c => c.post_id === post.id);
              const t = tally[post.id] || {};
              const total = Object.values(t).reduce((a, b) => a + b, 0);
              const sorted = [...postCandidates].sort((a, b) => (t[b.id] || 0) - (t[a.id] || 0));
              return (
                <div key={post.id} style={CARD}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
                    <div style={{ fontWeight: 700, fontSize: 17, color: "#f0ecff" }}>{post.title}</div>
                    <div style={{ fontSize: 12, color: "#4b5563" }}>{total} vote{total !== 1 ? "s" : ""} cast</div>
                  </div>
                  {postCandidates.length === 0 && <div style={{ color: "#374151", fontSize: 13 }}>No candidates.</div>}
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(150px,1fr))", gap: 16 }}>
                    {sorted.map((c, i) => {
                      const count = t[c.id] || 0;
                      const p = total ? Math.round((count / total) * 100) : 0;
                      const lead = i === 0 && count > 0;
                      return (
                        <div key={c.id} style={{
                          display: "flex", flexDirection: "column", alignItems: "center",
                          background: lead ? "rgba(22,101,52,0.2)" : "rgba(255,255,255,0.02)",
                          border: `2px solid ${lead ? "#22c55e" : "rgba(255,255,255,0.08)"}`,
                          borderRadius: 14, padding: "16px 10px 14px", textAlign: "center",
                          boxShadow: lead ? "0 0 24px rgba(34,197,94,0.2)" : "none",
                          position: "relative"
                        }}>
                          {lead && <div style={{ position: "absolute", top: -12, left: "50%", transform: "translateX(-50%)", background: "#22c55e", color: "#052e16", fontSize: 11, fontWeight: 800, padding: "2px 10px", borderRadius: 100, letterSpacing: 1 }}>LEADING</div>}
                          {c.photo
                            ? <img src={c.photo} alt={c.name} style={{ width: 100, height: 120, objectFit: "cover", objectPosition: "top", borderRadius: 10, border: `3px solid ${lead ? "#22c55e" : "rgba(255,255,255,0.1)"}`, marginBottom: 10, boxShadow: "0 4px 12px rgba(0,0,0,0.5)" }} />
                            : <div style={{ width: 100, height: 120, borderRadius: 10, background: "#1a2e1a", display: "flex", alignItems: "center", justifyContent: "center", border: `3px solid ${lead ? "#22c55e" : "rgba(255,255,255,0.08)"}`, marginBottom: 10, fontSize: 40 }}>👤</div>
                          }
                          <div style={{ fontSize: 13, color: lead ? "#f0fff0" : "#d1fae5", fontWeight: 700, marginBottom: 4, lineHeight: 1.3, textTransform: "uppercase", letterSpacing: 0.3 }}>{c.name}</div>
                          <div style={{ fontSize: 20, fontWeight: 800, color: lead ? "#4ade80" : "#86efac", marginBottom: 6 }}>{count}</div>
                          <div style={{ width: "100%", background: "rgba(255,255,255,0.07)", borderRadius: 100, height: 8, overflow: "hidden" }}>
                            <div style={{ height: "100%", borderRadius: 100, background: lead ? "linear-gradient(90deg,#16a34a,#22c55e)" : "#166534", width: `${p}%`, transition: "width 0.6s ease" }} />
                          </div>
                          <div style={{ fontSize: 11, color: "#6ee7b7", marginTop: 4, fontWeight: 600 }}>{p}%</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Post vote detail ───────────────────────────────────────────────
function PostVoteDetail({ post, candidates, voters, tally }) {
  const t = tally[post.id] || {};
  const total = Object.values(t).reduce((a, b) => a + b, 0);
  const votersByCand = {};
  candidates.forEach(c => { votersByCand[c.id] = []; });
  voters.forEach(v => {
    if (v.voted && v.votes && v.votes[post.id]) {
      const cid = v.votes[post.id];
      if (votersByCand[cid]) votersByCand[cid].push(v);
    }
  });
  const sorted = [...candidates].sort((a, b) => (t[b.id] || 0) - (t[a.id] || 0));
  return (
    <div style={{ background: "#060610", border: "1px solid #1e1e35", borderRadius: 10, padding: "1rem 1.2rem", marginBottom: 16 }}>
      <div style={{ fontSize: 11, color: "#6d28d9", fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>Vote Breakdown · {total} total vote{total !== 1 ? "s" : ""}</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
        {sorted.map((c, i) => {
          const count = t[c.id] || 0;
          const p = total ? Math.round((count / total) * 100) : 0;
          const lead = i === 0 && count > 0;
          const voterList = votersByCand[c.id] || [];
          return (
            <div key={c.id} style={{ background: lead ? "rgba(109,40,217,0.06)" : "rgba(255,255,255,0.01)", border: `1px solid ${lead ? "rgba(109,40,217,0.2)" : "#1a1a2e"}`, borderRadius: 10, padding: "12px 14px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                {c.photo ? <img src={c.photo} alt={c.name} style={{ width: 44, height: 44, borderRadius: "50%", objectFit: "cover", border: `2px solid ${lead ? "#7c3aed" : "#2d2d4a"}`, flexShrink: 0 }} /> : <div style={{ width: 44, height: 44, borderRadius: "50%", background: "#1a1a2e", display: "flex", alignItems: "center", justifyContent: "center", border: `2px solid ${lead ? "#7c3aed" : "#2d2d4a"}`, flexShrink: 0, fontSize: 18 }}>👤</div>}
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
                    <span style={{ fontSize: 14, color: lead ? "#f0ecff" : "#9ca3af", fontWeight: lead ? 700 : 500 }}>{lead ? "🏆 " : ""}{c.name}</span>
                    <span style={{ fontSize: 13, color: "#a78bfa", fontWeight: 700 }}>{count} ({p}%)</span>
                  </div>
                  <div style={{ background: "#1a1a2e", borderRadius: 100, height: 7, overflow: "hidden" }}>
                    <div style={{ height: "100%", borderRadius: 100, background: lead ? "linear-gradient(90deg,#6d28d9,#be185d)" : "#2d2d4a", width: `${p}%`, transition: "width 0.5s ease" }} />
                  </div>
                </div>
              </div>
              <div style={{ paddingLeft: 56 }}>
                {voterList.length > 0
                  ? <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>{voterList.map(v => <span key={v.matric_no} style={{ background: "rgba(109,40,217,0.1)", border: "1px solid rgba(109,40,217,0.2)", borderRadius: 6, padding: "3px 10px", fontSize: 11, color: "#c4b5fd" }}>{v.full_name || v.matric_no}<span style={{ color: "#374151" }}> · {v.matric_no}</span></span>)}</div>
                  : <div style={{ fontSize: 11, color: "#2d2d4a" }}>No votes yet</div>
                }
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════
// VOTER GATE
// ══════════════════════════════════════════════════════════════════════
function VoterGate({ setView }) {
  const { config, voters, loading } = useElectionData();
  const [form, setForm] = useState({ matricNo: "", level: "100", code: "" });
  const [err, setErr] = useState("");
  const [voter, setVoter] = useState(null);

  const login = () => {
    const found = voters.find(v =>
      v.matric_no.toLowerCase() === form.matricNo.trim().toLowerCase() &&
      v.level === form.level &&
      v.code.toLowerCase() === form.code.trim().toLowerCase()
    );
    if (!found) { setErr("Invalid credentials. Check your matric number, level, and unique code."); return; }
    setErr(""); setVoter(found);
  };

  if (voter) return <VotingBooth voter={voter} setView={setView} setVoter={setVoter} />;

  return (
    <Centered>
      <FCard icon={<div style={{display:"flex",gap:8,justifyContent:"center"}}><img src={LASU_LOGO} alt="LASU" style={{width:48,height:48,objectFit:"contain"}}/><img src={ASA_LOGO} alt="ASA" style={{width:48,height:48,objectFit:"contain"}}/></div>} title="LASUASA Election Portal" sub="Enter your credentials to access your ballot">
        {!config.voting_open && !loading && (
          <div style={{ background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 13, color: "#fca5a5" }}>⚠️ Voting is currently closed.</div>
        )}
        <label style={LABEL}>Matric Number</label>
        <input value={form.matricNo} onChange={e => setForm(f => ({ ...f, matricNo: e.target.value }))} placeholder="e.g. 241811022" style={INPUT} />
        <label style={LABEL}>Level</label>
        <select value={form.level} onChange={e => setForm(f => ({ ...f, level: e.target.value }))} style={INPUT}>{["100", "200", "300", "400"].map(l => <option key={l}>{l}</option>)}</select>
        <label style={LABEL}>Unique Code</label>
        <input value={form.code} onChange={e => setForm(f => ({ ...f, code: e.target.value }))} onKeyDown={e => e.key === "Enter" && login()} placeholder="Your unique voter code" style={INPUT} />
        {err && <ErrBox>{err}</ErrBox>}
        {loading && <div style={{ textAlign: "center", padding: "8px 0", color: "#6b7280", fontSize: 13, display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}><Spinner /> Loading voter data…</div>}
        <PBtn onClick={login} full>Access My Ballot</PBtn>
        <BackLink onClick={() => setView("home")}>← Back to Home</BackLink>
      </FCard>
    </Centered>
  );
}

// ══════════════════════════════════════════════════════════════════════
// VOTING BOOTH
// ══════════════════════════════════════════════════════════════════════
function VotingBooth({ voter, setView, setVoter }) {
  const { config, posts, candidates, voters, reload } = useElectionData();
  const [selections, setSelections] = useState({});
  const [submitted, setSubmitted]   = useState(false);
  const [err, setErr]               = useState("");
  const [busy, setBusy]             = useState(false);

  const liveVoter   = voters.find(v => v.matric_no === voter.matric_no);
  const alreadyVoted = (liveVoter && liveVoter.voted) || submitted;

  if (alreadyVoted) {
    return (
      <Centered>
        <div className="fi" style={{ textAlign: "center", maxWidth: 460, padding: "2rem" }}>
          <div style={{ fontSize: 76, marginBottom: 16 }}>✅</div>
          <h2 style={{ color: "#34d399", fontSize: 24, marginBottom: 8, fontWeight: 700 }}>Vote Recorded!</h2>
          <p style={{ color: "#6b7280", marginBottom: 24, fontSize: 15 }}>
            Thank you, <strong style={{ color: "#f0ecff" }}>{liveVoter ? liveVoter.full_name : voter.matric_no}</strong>.<br />
            Your vote has been securely saved to Supabase.
          </p>
          <PBtn onClick={() => { setView("home"); setVoter(null); }}>Return to Home</PBtn>
        </div>
      </Centered>
    );
  }

  if (!config.voting_open) {
    return (
      <Centered>
        <div style={{ textAlign: "center", maxWidth: 440, padding: "2rem" }}>
          <div style={{ fontSize: 64, marginBottom: 16 }}>🔒</div>
          <h2 style={{ color: "#f87171", fontSize: 22, marginBottom: 8 }}>Voting Closed</h2>
          <p style={{ color: "#6b7280", marginBottom: 24 }}>Voting has been closed by the administrator.</p>
          <PBtn onClick={() => { setView("home"); setVoter(null); }}>Back to Home</PBtn>
        </div>
      </Centered>
    );
  }

  const select = (pid, cid) => setSelections(s => ({ ...s, [pid]: cid }));

  const submitVote = async () => {
    const unvoted = posts.filter(p => !selections[p.id] && candidates.filter(c => c.post_id === p.id).length > 0);
    if (unvoted.length > 0) { setErr(`Please vote for: ${unvoted.map(p => p.title).join(", ")}`); return; }
    setBusy(true);
    try {
      await db.update("voters", { matric_no: voter.matric_no }, { voted: true, votes: selections });
      await reload();
      setSubmitted(true);
    } catch (e) {
      setErr("Failed to submit: " + e.message);
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", background: "#0a1f0a", padding: "2rem 1rem" }}>
      <div style={{ maxWidth: 700, margin: "0 auto" }}>
        {/* Welcome */}
        <div className="fi" style={{ background: "linear-gradient(135deg,rgba(109,40,217,0.15),rgba(190,24,93,0.1))", border: "1px solid rgba(109,40,217,0.3)", borderRadius: 14, padding: "1.4rem 1.6rem", marginBottom: "2rem", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
          <div style={{ width: 52, height: 52, borderRadius: "50%", flexShrink: 0, background: "linear-gradient(135deg,#6d28d9,#be185d)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, fontWeight: 700, color: "#fff", boxShadow: "0 0 20px rgba(109,40,217,0.4)" }}>
            {(liveVoter ? liveVoter.full_name : voter.matric_no).charAt(0).toUpperCase()}
          </div>
          <div>
            <div style={{ color: "#86efac", fontSize: 10, letterSpacing: 3, textTransform: "uppercase", marginBottom: 2 }}>LASUASA Election Portal</div>
            <div style={{ color: "#f0ecff", fontSize: 18, fontWeight: 700 }}>{liveVoter ? liveVoter.full_name : voter.matric_no}</div>
            <div style={{ color: "#4b5563", fontSize: 12 }}>Matric: {voter.matric_no} · Level {voter.level}</div>
          </div>
          <div style={{ marginLeft: "auto" }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, background: "rgba(16,185,129,0.08)", border: "1px solid #10b981", borderRadius: 100, padding: "4px 12px", color: "#34d399" }}>
              <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#34d399", animation: "pulse 2s infinite", display: "inline-block" }} />
              Voting Open
            </div>
          </div>
        </div>

        <div style={{ textAlign: "center", marginBottom: "2rem" }}>
          <h1 style={{ color: "#f0fff0", fontSize: 22, fontWeight: 700, margin: "0 0 4px" }}>Your Official Ballot</h1>
          <p style={{ color: "#4b5563", fontSize: 13, margin: 0 }}>Select one candidate per post, then submit.</p>
        </div>

        {posts.length === 0 && <Empty>No posts have been configured yet.</Empty>}

        {posts.map((post, i) => {
          const postCandidates = candidates.filter(c => c.post_id === post.id);
          return (
            <div key={post.id} className="fi" style={{ ...CARD, marginBottom: 20 }}>
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 10, color: "#6d28d9", letterSpacing: 4, textTransform: "uppercase" }}>Post {i + 1}</div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#f0ecff", marginTop: 2 }}>{post.title}</div>
              </div>
              {postCandidates.length === 0
                ? <div style={{ fontSize: 13, color: "#374151" }}>No candidates for this post.</div>
                : (
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(140px,1fr))", gap: 14 }}>
                    {postCandidates.map(c => {
                      const sel = selections[post.id] === c.id;
                      return (
                        <button key={c.id} onClick={() => select(post.id, c.id)} style={{
                          display: "flex", flexDirection: "column", alignItems: "center",
                          padding: "16px 10px 14px", cursor: "pointer", textAlign: "center",
                          background: sel ? "rgba(22,101,52,0.35)" : "rgba(255,255,255,0.03)",
                          border: sel ? "2px solid #22c55e" : "2px solid rgba(255,255,255,0.08)",
                          borderRadius: 14, transition: "all 0.18s", fontFamily: "inherit",
                          position: "relative", boxShadow: sel ? "0 0 20px rgba(34,197,94,0.25)" : "none"
                        }}>
                          {sel && <div style={{ position: "absolute", top: 8, right: 8, width: 22, height: 22, borderRadius: "50%", background: "#22c55e", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, color: "#fff", fontWeight: 700 }}>✓</div>}
                          {c.photo
                            ? <img src={c.photo} alt={c.name} style={{ width: 90, height: 110, objectFit: "cover", objectPosition: "top", borderRadius: 10, border: `3px solid ${sel ? "#22c55e" : "rgba(255,255,255,0.1)"}`, marginBottom: 10, boxShadow: sel ? "0 0 14px rgba(34,197,94,0.4)" : "0 2px 8px rgba(0,0,0,0.4)" }} />
                            : <div style={{ width: 90, height: 110, borderRadius: 10, background: "#1a2e1a", display: "flex", alignItems: "center", justifyContent: "center", border: `3px solid ${sel ? "#22c55e" : "rgba(255,255,255,0.08)"}`, marginBottom: 10, fontSize: 36 }}>👤</div>
                          }
                          <span style={{ fontSize: 13, color: sel ? "#f0fff0" : "#d1fae5", fontWeight: sel ? 700 : 500, lineHeight: 1.3, textTransform: "uppercase", letterSpacing: 0.3 }}>{c.name}</span>
                          {sel && <span style={{ fontSize: 11, color: "#4ade80", fontWeight: 700, marginTop: 4 }}>SELECTED</span>}
                        </button>
                      );
                    })}
                  </div>
                )
              }
            </div>
          );
        })}

        {err && <ErrBox>{err}</ErrBox>}
        {posts.length > 0 && (
          <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", marginTop: 8, paddingBottom: "2rem" }}>
            <button onClick={() => { setView("home"); setVoter(null); }} style={GBTN}>Cancel</button>
            <button onClick={submitVote} disabled={busy} style={{ background: "linear-gradient(135deg,#166534,#15803d)", color: "#f0fff0", border: "1px solid #22c55e", borderRadius: 10, padding: "12px 30px", cursor: busy ? "not-allowed" : "pointer", fontWeight: 700, fontSize: 15, boxShadow: "0 4px 22px rgba(34,197,94,0.3)", fontFamily: "inherit", opacity: busy ? 0.7 : 1, display: "flex", alignItems: "center", gap: 10 }}>
              {busy ? <><Spinner /> Submitting…</> : "Submit Ballot →"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
